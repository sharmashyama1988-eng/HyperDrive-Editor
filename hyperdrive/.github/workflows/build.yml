name: Build and Release HyperDrive

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Frontend Dependencies
        run: npm install

      - name: Build Frontend
        run: npm run build

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller pywebview

      - name: Compile PyInstaller Executable
        run: pyinstaller HyperDrive.spec --clean --noconfirm

      - name: Cache Ollama Cache
        id: cache-ollama
        uses: actions/cache@v4
        with:
          path: |
            OllamaSetup.exe
            C:\Users\runneradmin\.ollama
            C:\Users\runneradmin\AppData\Local\Programs\Ollama
          key: ${{ runner.os }}-ollama-v3

      - name: Download Ollama Setup Installer
        if: steps.cache-ollama.outputs.cache-hit != 'true'
        run: |
          curl.exe -L -o OllamaSetup.exe https://ollama.com/download/OllamaSetup.exe
        shell: powershell

      - name: Install Ollama Silently
        if: steps.cache-ollama.outputs.cache-hit != 'true'
        run: |
          # Start installer in background
          $proc = Start-Process -FilePath .\OllamaSetup.exe -ArgumentList "/silent /verysilent /sp- /norestart" -PassThru -NoNewWindow
          Start-Sleep -Seconds 45
          # Force kill Ollama processes using cmd to avoid PowerShell native command errors
          cmd.exe /c "taskkill /F /IM ollama* /T 2>nul"
          cmd.exe /c "taskkill /F /IM Ollama* /T 2>nul"
          $LastExitCode = 0
        shell: powershell

      - name: Start Ollama Service & Pull AI Model
        if: steps.cache-ollama.outputs.cache-hit != 'true'
        run: |
          # Kill any lingering instances first using cmd
          cmd.exe /c "taskkill /F /IM ollama* /T 2>nul"
          cmd.exe /c "taskkill /F /IM Ollama* /T 2>nul"
          $LastExitCode = 0
          Start-Sleep -Seconds 2
          
          # Start the server headlessly using CLI
          Start-Process -FilePath "C:\Users\runneradmin\AppData\Local\Programs\Ollama\ollama.exe" -ArgumentList "serve" -NoNewWindow
          Start-Sleep -Seconds 15
          
          # Pull the required AI model
          & "C:\Users\runneradmin\AppData\Local\Programs\Ollama\ollama.exe" pull qwen2.5-coder:1.5b
          
          # Shutdown the server cleanly using cmd
          cmd.exe /c "taskkill /F /IM ollama* /T 2>nul"
          $LastExitCode = 0
        shell: powershell

      - name: Compile Inno Setup Installer
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" hyperdrive_installer.iss
        shell: powershell

      - name: Upload Installer Artifact
        uses: actions/upload-artifact@v4
        with:
          name: HyperDrive_Offline_Setup
          path: setup_out/HyperDrive_Offline_Setup.exe
          if-no-files-found: error
