<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HyperDrive Editor</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- Titlebar (VS Code style) -->
  <div id="titlebar">
    <div class="title-left">
      <div class="menu-icon" style="padding: 0 10px; cursor: pointer;">☰</div>
    </div>
    <div class="title-center">
      <div class="search-bar" style="background: var(--bg-dark); border: 1px solid var(--border); border-radius: 6px; padding: 4px 150px; color: var(--text-muted); font-size: 12px; display: flex; align-items: center; gap: 8px;">
        🔍 HyperDrive-Workspace
      </div>
    </div>
    <div class="window-controls">
      <button class="win-btn close" onclick="window.pywebview?.api?.close_window()"></button>
      <button class="win-btn minimize" onclick="window.pywebview?.api?.minimize_window()"></button>
      <button class="win-btn maximize" onclick="window.pywebview?.api?.maximize_window()"></button>
    </div>
  </div>

  <div id="workbench" style="display: flex; height: calc(100vh - 35px); overflow: hidden;">
    <!-- Left Action Bar (Activity Bar) -->
    <div id="activity-bar" style="width: 48px; background: var(--bg-panel); display: flex; flex-direction: column; align-items: center; padding-top: 10px; border-right: 1px solid var(--border);">
      <div class="action-icon active" id="action-explorer" title="Explorer">📄</div>
      <div class="action-icon" id="action-search" title="Search">🔍</div>
      <div class="action-icon" id="action-git" title="Source Control">🌵</div>
      <div class="action-icon" id="action-extensions" title="Extensions">🧩</div>
      <div style="flex-grow: 1;"></div>
      <div class="action-icon" id="action-ai" title="AI Agent">🤖</div>
      <div class="action-icon" id="action-settings" title="Settings">⚙️</div>
    </div>

    <!-- Sidebar (File Tree / Extensions) -->
    <div id="sidebar">
      <div class="sidebar-header" id="sidebar-title">EXPLORER</div>
      <div id="file-tree" class="sidebar-view active-view"></div>
      
      <!-- Extensions View -->
      <div id="extensions-view" class="sidebar-view" style="display: none; padding: 10px;">
        <button id="btn-install-vsix" style="width: 100%; padding: 8px; background: var(--bg-panel); color: var(--text-main); border: 1px solid var(--border); border-radius: 4px; cursor: pointer; font-weight: bold; margin-bottom: 5px;">Install from VSIX...</button>
        <button id="btn-search-ext" style="width: 100%; padding: 8px; background: var(--accent); color: #000; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; margin-bottom: 10px;">Search Online...</button>
        <div id="installed-extensions-list"></div>
      </div>
      
      <!-- Git Source Control View -->
      <div id="git-view" class="sidebar-view" style="display: none; padding: 10px;">
        <div style="margin-bottom: 15px;">
          <input type="text" id="git-commit-msg" placeholder="Commit message" style="width: 100%; padding: 8px; background: var(--bg-dark); color: var(--text-main); border: 1px solid var(--border); border-radius: 4px; margin-bottom: 10px;">
          <button id="btn-git-push" style="width: 100%; padding: 8px; background: var(--accent); color: #000; border: none; border-radius: 4px; cursor: pointer; font-weight: bold;">Commit & Push</button>
        </div>
        <div id="git-status-output" style="font-size: 11px; color: var(--text-muted); font-family: monospace; white-space: pre-wrap;"></div>
      </div>

      <!-- Settings View -->
      <div id="settings-view" class="sidebar-view" style="display: none; padding: 10px;">
        
        <div class="setting-group" style="margin-bottom: 15px;">
          <label style="display: block; font-size: 11px; color: var(--text-muted); margin-bottom: 5px; text-transform: uppercase;">Theme</label>
          <select id="setting-theme" style="width: 100%; padding: 6px; background: var(--bg-dark); color: var(--text-main); border: 1px solid var(--border); border-radius: 4px;">
            <option value="obsidian" selected>Obsidian (Cinematic)</option>
            <option value="dracula">Dracula</option>
            <option value="cyberpunk">Cyberpunk Neon</option>
          </select>
        </div>

        <div class="setting-group" style="margin-bottom: 15px;">
          <label style="display: block; font-size: 11px; color: var(--text-muted); margin-bottom: 5px; text-transform: uppercase;">Font Size</label>
          <input type="number" id="setting-font-size" value="14" min="10" max="30" style="width: 100%; padding: 6px; background: var(--bg-dark); color: var(--text-main); border: 1px solid var(--border); border-radius: 4px;">
        </div>
        
        <div class="setting-group" style="margin-bottom: 15px;">
          <label style="display: block; font-size: 11px; color: var(--text-muted); margin-bottom: 5px; text-transform: uppercase;">Tab Size</label>
          <select id="setting-tab-size" style="width: 100%; padding: 6px; background: var(--bg-dark); color: var(--text-main); border: 1px solid var(--border); border-radius: 4px;">
            <option value="2">2 Spaces</option>
            <option value="4" selected>4 Spaces</option>
            <option value="8">8 Spaces</option>
          </select>
        </div>

        <div class="setting-group" style="margin-bottom: 15px;">
          <label style="display: block; font-size: 11px; color: var(--text-muted); margin-bottom: 5px; text-transform: uppercase;">Word Wrap</label>
          <select id="setting-word-wrap" style="width: 100%; padding: 6px; background: var(--bg-dark); color: var(--text-main); border: 1px solid var(--border); border-radius: 4px;">
            <option value="off">Off</option>
            <option value="on" selected>On</option>
          </select>
        </div>

        <div class="setting-group" style="margin-bottom: 15px;">
          <label style="display: block; font-size: 11px; color: var(--text-muted); margin-bottom: 5px; text-transform: uppercase;">Minimap</label>
          <select id="setting-minimap" style="width: 100%; padding: 6px; background: var(--bg-dark); color: var(--text-main); border: 1px solid var(--border); border-radius: 4px;">
            <option value="true" selected>Show</option>
            <option value="false">Hide</option>
          </select>
        </div>
      </div>
    </div>

    <!-- Main Editor Area -->
    <div id="editor-container" style="flex: 1; display: flex; flex-direction: column; position: relative;">
      
      <!-- Welcome Screen Overlay -->
      <div id="welcome-screen" style="position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: var(--bg-dark); z-index: 10; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--text-main);">
        <h1 style="font-size: 3rem; font-weight: 300; margin-bottom: 10px; letter-spacing: 2px;">HyperDrive</h1>
        <p style="color: var(--text-muted); margin-bottom: 40px; font-size: 1.1rem;">Enterprise Code Editor & Agentic AI</p>
        
        <div style="display: flex; gap: 40px; text-align: left; max-width: 600px; width: 100%;">
          <div style="flex: 1;">
            <h3 style="color: var(--text-muted); font-size: 0.9rem; text-transform: uppercase; margin-bottom: 15px;">Start</h3>
            <div class="welcome-action" id="btn-open-folder" style="padding: 8px 0; color: var(--accent); cursor: pointer; display: flex; align-items: center; gap: 10px;">📁 Open Folder...</div>
            <div class="welcome-action" id="btn-new-file" style="padding: 8px 0; color: var(--accent); cursor: pointer; display: flex; align-items: center; gap: 10px;">📄 New File</div>
          </div>
          <div style="flex: 1;">
            <h3 style="color: var(--text-muted); font-size: 0.9rem; text-transform: uppercase; margin-bottom: 15px;">Recent</h3>
            <div id="recent-projects-list" style="display: flex; flex-direction: column; gap: 10px;">
              <span style="color: var(--text-muted); font-size: 0.9rem;">No recent projects</span>
            </div>
          </div>
        </div>
      </div>

      <div id="tabs-container" style="display: flex; background: var(--bg-panel); border-bottom: 1px solid var(--border); overflow-x: auto;"></div>
      <div id="monaco-host" style="flex: 1;"></div>
    </div>

    <!-- Secondary Sidebar (Right - AI Chat) -->
    <div id="secondary-sidebar" style="width: 300px; background: var(--bg-panel); border-left: 1px solid var(--border); display: flex; flex-direction: column; display: none;">
      <div class="sidebar-header" style="display: flex; justify-content: space-between; align-items: center;">
        <span>GITHUB COPILOT</span>
        <button id="close-secondary" style="background: none; border: none; color: var(--text-muted); cursor: pointer;">✖</button>
      </div>
      <div id="ai-chat-content" style="flex: 1; padding: 10px; overflow-y: auto; color: var(--text-main); font-size: 13px;">
        <div style="margin-bottom: 10px; opacity: 0.8;">🤖 How can I help you today?</div>
      </div>
      <div style="padding: 10px; border-top: 1px solid var(--border);">
        <input type="text" id="ai-chat-input" placeholder="Ask Copilot (@, /, 📎)" style="width: 100%; padding: 8px; background: var(--bg-dark); color: var(--text-main); border: 1px solid var(--border); border-radius: 4px;">
      </div>
    </div>
  </div>

  <!-- Terminal / Panel Area -->
  <div id="panel">
    <div class="panel-header">
      <span class="panel-tab active">TERMINAL</span>
      <span class="panel-tab">OUTPUT</span>
      <span class="panel-tab">PROBLEMS</span>
      <button id="close-panel">X</button>
    </div>
    <div id="terminal-content"></div>
  </div>

  <!-- Load Monaco Editor -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.41.0/min/vs/loader.min.js"></script>
  <script>
    require.config({ paths: { 'vs': 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.41.0/min/vs' }});
    window.MonacoEnvironment = { getWorkerUrl: () => proxy };

    let proxy = URL.createObjectURL(new Blob([`
      self.MonacoEnvironment = {
        baseUrl: 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.41.0/min/'
      };
      importScripts('https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.41.0/min/vs/base/worker/workerMain.js');
    `], { type: 'text/javascript' }));
  </script>

  <!-- App Logic -->
  <script src="js/main.js"></script>
  <script src="js/ext_host.js"></script>
</body>
</html>
