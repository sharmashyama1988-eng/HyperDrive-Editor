name: Build and Release HyperDrive

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Frontend Dependencies
        run: npm install

      - name: Build Frontend
        run: npm run build

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller pywebview

      - name: Compile PyInstaller Executable
        run: pyinstaller HyperDrive.spec --clean --noconfirm

      - name: Cache Ollama Cache
        id: cache-ollama
        uses: actions/cache@v4
        with:
          path: |
            OllamaSetup.exe
            C:\Users\runneradmin\.ollama
            C:\Users\runneradmin\AppData\Local\Programs\Ollama
          key: ${{ runner.os }}-ollama-v3

      - name: Download Ollama Setup Installer
        if: steps.cache-ollama.outputs.cache-hit != 'true'
        run: |
          curl.exe -L -o OllamaSetup.exe https://ollama.com/download/OllamaSetup.exe
        shell: powershell

      - name: Install Ollama Silently
        if: steps.cache-ollama.outputs.cache-hit != 'true'
        run: |
          # Start installer in background without -Wait since it auto-launches GUI and hangs
          $proc = Start-Process -FilePath .\OllamaSetup.exe -ArgumentList "/silent /verysilent /sp- /norestart" -PassThru -NoNewWindow
          Start-Sleep -Seconds 45
          # Force kill Ollama GUI process so the installer can finish and the runner doesn't hang
          Get-Process -Name "ollama*" -ErrorAction SilentlyContinue | Stop-Process -Force
          Get-Process -Name "Ollama*" -ErrorAction SilentlyContinue | Stop-Process -Force
          if ($proc -and -not $proc.HasExited) {
              Stop-Process -Id $proc.Id -Force
          }
        shell: powershell

      - name: Start Ollama Service & Pull AI Model
        if: steps.cache-ollama.outputs.cache-hit != 'true'
        run: |
          Start-Process -FilePath "C:\Users\runneradmin\AppData\Local\Programs\Ollama\ollama app.exe" -NoNewWindow
          Start-Sleep -Seconds 20
          & "C:\Users\runneradmin\AppData\Local\Programs\Ollama\ollama.exe" pull qwen2.5-coder:1.5b
        shell: powershell

      - name: Compile Inno Setup Installer
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" hyperdrive_installer.iss
        shell: powershell

      - name: Upload Installer Artifact
        uses: actions/upload-artifact@v4
        with:
          name: HyperDrive_Offline_Setup
          path: setup_out/HyperDrive_Offline_Setup.exe
          if-no-files-found: error
